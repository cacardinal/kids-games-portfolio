<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="loop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#39d98a"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- terminal panel field with rounded corners -->
  <rect width="512" height="512" rx="112" fill="#07090d"/>
  <rect x="26" y="26" width="460" height="460" rx="92" fill="#0d1117" stroke="#1a2230" stroke-width="3"/>

  <!-- faint scanlines -->
  <g opacity="0.16">
    <rect x="26" y="80" width="460" height="3" fill="#39d98a"/>
    <rect x="26" y="150" width="460" height="3" fill="#39d98a"/>
    <rect x="26" y="220" width="460" height="3" fill="#39d98a"/>
    <rect x="26" y="290" width="460" height="3" fill="#39d98a"/>
    <rect x="26" y="360" width="460" height="3" fill="#39d98a"/>
    <rect x="26" y="430" width="460" height="3" fill="#39d98a"/>
  </g>

  <!-- the REPEAT loop glyph (open circular arrow) in the brand gradient -->
  <path d="M 168 330
           A 110 110 0 1 1 344 330"
        fill="none" stroke="url(#loop)" stroke-width="34" stroke-linecap="round"/>
  <!-- arrowhead -->
  <polygon points="344,330 318,288 372,300" fill="#22d3ee"/>

  <!-- rover chevron at the loop's heart -->
  <polygon points="256,150 300,236 256,212 212,236" fill="#39d98a"/>
  <circle cx="256" cy="252" r="20" fill="#07090d" stroke="#39d98a" stroke-width="9"/>
</svg>
