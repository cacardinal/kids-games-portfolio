<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kids Games — five real games built for a 6- and 8-year-old">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f1216"/>
      <stop offset="0.55" stop-color="#14181e"/>
      <stop offset="1" stop-color="#1b1a16"/>
    </linearGradient>
    <linearGradient id="brass" x1="90" y1="120" x2="560" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f0c368"/>
      <stop offset="1" stop-color="#d9a441"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d9a441" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#d9a441" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="340" rx="20" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="1278.5" height="338.5" rx="19.25" fill="none" stroke="#2b323e" stroke-width="1.5"/>
  <circle cx="1030" cy="150" r="330" fill="url(#glow)"/>

  <!-- controller mark -->
  <g transform="translate(96,96)" stroke="url(#brass)" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="14" width="86" height="52" rx="26"/>
    <!-- d-pad -->
    <line x1="22" y1="40" x2="38" y2="40"/>
    <line x1="30" y1="32" x2="30" y2="48"/>
    <!-- buttons -->
    <circle cx="58" cy="34" r="4.5" fill="url(#brass)" stroke="none"/>
    <circle cx="68" cy="46" r="4.5" fill="url(#brass)" stroke="none"/>
  </g>

  <!-- wordmark -->
  <text x="200" y="150" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="88" font-weight="800" fill="url(#brass)" letter-spacing="-2">Kids Games</text>
  <rect x="204" y="170" width="516" height="4" rx="2" fill="url(#brass)" opacity="0.55"/>
  <text x="205" y="212" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="25" font-weight="600" fill="#e8e6e1">Five real games. No ads, no dark patterns.</text>
  <text x="205" y="248" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="18.5" font-weight="500" fill="#9aa3ad">Detective work, atlas expeditions, blueprint physics, kingdom strategy, rover code.</text>
  <text x="205" y="286" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#6f7783" letter-spacing="1.5">BUILT FOR A 6- AND 8-YEAR-OLD</text>

  <!-- five game tiles -->
  <g>
    <!-- tile bg + brass glyph, translate each into place; tiles 80x80, pitch 92 -->
    <!-- 1 Detective: magnifier -->
    <g transform="translate(800,130)">
      <rect width="80" height="80" rx="16" fill="#1b2029" stroke="#2b323e" stroke-width="1.5"/>
      <g stroke="url(#brass)" stroke-width="4" fill="none" stroke-linecap="round">
        <circle cx="34" cy="34" r="15"/>
        <line x1="45" y1="45" x2="58" y2="58"/>
      </g>
    </g>
    <!-- 2 Explorer: globe -->
    <g transform="translate(892,130)">
      <rect width="80" height="80" rx="16" fill="#1b2029" stroke="#2b323e" stroke-width="1.5"/>
      <g stroke="url(#brass)" stroke-width="3.5" fill="none">
        <circle cx="40" cy="40" r="22"/>
        <ellipse cx="40" cy="40" rx="9" ry="22"/>
        <line x1="18" y1="40" x2="62" y2="40"/>
      </g>
    </g>
    <!-- 3 Inventor Lab: lightbulb -->
    <g transform="translate(984,130)">
      <rect width="80" height="80" rx="16" fill="#1b2029" stroke="#2b323e" stroke-width="1.5"/>
      <g stroke="url(#brass)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M40 17 A16 16 0 0 1 50 46 L30 46 A16 16 0 0 1 40 17 Z"/>
        <line x1="33" y1="52" x2="47" y2="52"/>
        <line x1="35" y1="58" x2="45" y2="58"/>
        <line x1="37" y1="63" x2="43" y2="63"/>
      </g>
    </g>
    <!-- 4 Kingdom: crown -->
    <g transform="translate(1076,130)">
      <rect width="80" height="80" rx="16" fill="#1b2029" stroke="#2b323e" stroke-width="1.5"/>
      <g stroke="url(#brass)" stroke-width="3.5" fill="none" stroke-linejoin="round">
        <path d="M20 52 L20 30 L31 40 L40 26 L49 40 L60 30 L60 52 Z"/>
        <line x1="20" y1="58" x2="60" y2="58"/>
      </g>
    </g>
    <!-- 5 Code Quest: terminal -->
    <g transform="translate(1168,130)">
      <rect width="80" height="80" rx="16" fill="#1b2029" stroke="#2b323e" stroke-width="1.5"/>
      <g stroke="url(#brass)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M26 28 L38 40 L26 52"/>
        <line x1="44" y1="52" x2="56" y2="52"/>
      </g>
    </g>
  </g>
</svg>
